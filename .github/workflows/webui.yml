name: WebUI CI

on:
  push:
    paths:
      - 'webui/**'
      - '.github/workflows/webui.yml'
  pull_request:
    paths:
      - 'webui/**'

jobs:
  test:
    name: Tests (UI smoke + protocol round-trip)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install npm deps
        run: npm ci

      # Cache the Playwright browser download (~150 MB) keyed on the
      # @playwright/test version so a version bump invalidates it.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('webui/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      # Even on a cache hit, system libs the browser links against may be
      # missing on a fresh runner. --with-deps is idempotent and cheap.
      - name: Ensure Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webui/playwright-report/
          retention-days: 7
