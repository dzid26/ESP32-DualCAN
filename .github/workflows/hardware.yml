name: Hardware Release

# Two modes depending on what triggered the run:
#
#   Push to hardware/** on main
#     -> Exports artifacts and updates (or creates) the rolling "hw-next"
#        draft release. Use this to preview exports while iterating.
#
#   Push a hw-v* tag
#     -> Exports artifacts and publishes a real, versioned release.
#
# Tag conventions:
#   hw-v1.0     -> stable hardware revision
#   hw-v1.1-rc1 -> pre-release (any hyphen after the version)
#
# Usage:
#   git tag hw-v1.1
#   git push origin hw-v1.1

on:
  push:
    branches: [main]
    paths:
      - 'hardware/**'
      - '.github/workflows/hardware.yml'
    tags:
      - 'hw-v*'

jobs:
  export:
    name: Export hardware artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install KiCad
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-8.0-releases
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends kicad

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/hw-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/hw-v}"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "name=Hardware ${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=hw-next" >> "$GITHUB_OUTPUT"
            echo "name=Hardware - next (draft)" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update hw-next tag (rolling draft only)
        if: steps.meta.outputs.tag == 'hw-next'
        run: |
          git tag -f hw-next
          git push -f origin hw-next

      - name: Export schematic PDF
        run: |
          kicad-cli sch export pdf \
            --output hardware/ESP32-DualCAN-schematic.pdf \
            hardware/ESP32-DualCAN.kicad_sch

      - name: Generate iBOM (dark)
        run: |
          # KiCad installation provides pcbnew; skip wxpython GUI dep
          pip install interactivehtmlbom --no-deps
          python -m interactivehtmlbom.generate_interactive_bom \
            --dark-mode \
            --no-browser \
            --dest-dir hardware/ \
            --output-file-name ESP32-DualCAN-ibom.html \
            hardware/ESP32-DualCAN.kicad_pcb

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: ${{ steps.meta.outputs.draft == 'false' }}
          files: |
            hardware/ESP32-DualCAN-schematic.pdf
            hardware/ESP32-DualCAN-ibom.html
          body: |
            Automated KiCad export. Schematic PDF + interactive iBOM (dark mode).
