name: Prerelease

on:
  push:
    branches: [main]
    paths: ['.github/workflows/prerelease.yml']
  workflow_run:
    workflows: ["Firmware CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Publish continuous prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate workflow file
        if: github.event_name == 'push'
        run: echo "prerelease.yml syntax OK"

      - name: Download firmware artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload to continuous prerelease
        if: github.event_name == 'workflow_run'
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous build (${{ github.event.workflow_run.head_sha }})
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: firmware.bin
