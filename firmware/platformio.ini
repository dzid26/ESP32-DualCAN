; Dorky Commander firmware — ESP32-C6-SuperMini
;
; Environments:
;   esp32-c6                Production firmware (ESP-IDF). `pio run`.
;   tests-native            Host unit tests (no hardware).
;                           `pio test -e tests-native`.
;   esp32-c6-tests-arduino  On-device hardware smoke tests (Arduino, not
;                           sharing production code).
;                           `pio test -e esp32-c6-tests-arduino`.
;
; Note: the pioarduino platform fork is required for ESP32-C6 + TWAI v2 API
; support. It provides both the Arduino and ESP-IDF frameworks.

[platformio]
build_cache_dir = .cache
default_envs = esp32-c6

[env]
upload_speed = 921600
monitor_speed = 115200


; ---------- production firmware (ESP-IDF, release) ----------
[env:esp32-c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = espidf
board_upload.flash_size = 4MB ; ESP32-C6-SuperMini module has 4 MB
build_flags =
  -D DORKY_FIRMWARE_VERSION=\"0.0.1-dev\"
; Production firmware has no tests of its own — they live in the test envs.
; Without this, `pio test` tries to compile Arduino-only test files against
; the ESP-IDF build and fails with missing <Arduino.h>.
test_ignore = *

; ---------- same firmware with debug symbols + gdb ready ----------
; Separate env for faster switching
;   pio debug -e esp32-c6-debug
[env:esp32-c6-debug]
extends = env:esp32-c6
; Use the C6's built-in USB-Serial-JTAG for gdb, instead of default CMSIS-DAP (which ; requires external probe)
debug_tool = esp-builtin
build_type = debug
build_flags =
  ${env:esp32-c6.build_flags}
  -D DORKY_DEBUG_BUILD=1

; ---------- hardware smoke tests (Arduino) ----------
[env:esp32-c6-tests-arduino]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
test_framework = unity
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
test_speed = 115200
; test_filter defaults to `*` so we just need to exclude the native-only
; suites. test_ignore is a hard skip — honored even when VSCode's Test
; Explorer forces a specific test via `-f` (which overrides test_filter).
test_ignore = test_native_*

; ---------- host unit tests ----------
[env:tests-native]
platform = native
test_framework = unity
test_ignore = test_hw_*
build_flags =
  -std=c11
  -Wall
  -Wextra