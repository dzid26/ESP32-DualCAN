; Dorky Commander firmware — ESP32-C6-SuperMini
;
; Hardware-in-the-loop tests (Arduino framework, run on device):
;   pio test -e esp32-c6-tests-arduino
;
; Note: the pioarduino platform fork is required for ESP32-C6 + TWAI v2 API
; support.

[platformio]
build_cache_dir = .cache

[env]
upload_speed = 921600
monitor_speed = 115200

; ---------- hardware smoke tests (Arduino) ----------
[env:esp32-c6-tests-arduino]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
test_framework = unity
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
test_speed = 115200
test_filter = test_hw_*
